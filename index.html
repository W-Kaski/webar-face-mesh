<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WebAR Face Mesh</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:system-ui}
canvas.a-canvas{position:fixed!important;top:0!important;left:0!important}
#loading-overlay{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.9);color:#fff;gap:20px;
}
.spinner{
  width:48px;height:48px;
  border:3px solid rgba(255,255,255,0.15);border-top-color:#64ffda;
  border-radius:50%;animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-overlay p{font-size:14px;color:rgba(255,255,255,0.65);text-align:center;line-height:1.8}
#hud{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:50;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);color:rgba(255,255,255,0.9);
  padding:10px 24px;border-radius:28px;font-size:13px;letter-spacing:0.3px;
  pointer-events:none;transition:opacity 0.4s;
}
#info{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:50;
  font-size:11px;color:rgba(255,255,255,0.35);pointer-events:none;
}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p>
    Loading MediaPipe Face Mesh…<br>
    Please allow camera access when prompted<br>
    <span style="font-size:12px;opacity:0.5">Works best in Chrome on desktop</span>
  </p>
</div>

<div id="hud">Point camera at the AR marker</div>
<div id="info">WebAR Face Mesh · AR.js + MediaPipe + Three.js</div>

<video id="input-video" autoplay playsinline muted style="display:none"></video>
<canvas id="face-canvas" style="display:none"></canvas>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true; colorManagement: true"
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono;"
>
  <!-- Marker (Hiro pattern) -->
  <a-marker id="ar-marker" preset="hiro" smooth="true" smoothCount="5" smoothTolerance="0.01">
    <!-- Content injected by JS -->
  </a-marker>

  <!-- Camera entity (required by A-Frame AR.js) -->
  <a-entity camera="active: true" position="0 0 0"></a-entity>
</a-scene>

<!-- A-Frame + AR.js (CDN) -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ar-js-org/ar.js@3/aframe/build/aframe-ar.js"></script>
<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

// ─── DOM ────────────────────────────────────────────────────────────────

const hudEl     = document.getElementById('hud');
const video     = document.getElementById('input-video');
const faceCanvas = document.getElementById('face-canvas');
const faceCtx    = faceCanvas.getContext('2d');

// ─── State ──────────────────────────────────────────────────────────────

let faceReady      = false;
let threeScene, threeCamera, threeRenderer;
let arContext, arSource;
let markerRoot, facePlane, faceTexture, facePointsMesh;
let faceCanvasW = 640, faceCanvasH = 480;

// ─── Init: runs after A-Frame scene is ready ────────────────────────────
AFRAME.registerComponent('face-mesh-detector', {
  init: function () {
    const scene = this.el.sceneEl;

    scene.addEventListener('loaded', () => {
      // Access Three.js internals from A-Frame
      threeScene    = scene.object3D;
      threeCamera   = scene.camera;
      threeRenderer = scene.renderer;

      // Get AR.js context and source (AR.js v3 uses 'arjs' system)
      const sys = scene.systems;
      const arSystem = sys.arjs || sys.arToolkit || sys['arjs'] || sys['arToolkitContext'];
      if (arSystem) {
        arContext = arSystem.arContext  || arSystem.context  || null;
        arSource  = arSystem.arSource  || arSystem.source   || null;
      }
      // Fallback: scan all systems for one that has arContext
      if (!arContext) {
        for (const key of Object.keys(sys)) {
          if (sys[key] && sys[key].arContext) {
            arContext = sys[key].arContext;
            arSource  = sys[key].arSource;
            console.log(`Found AR system via scan: ${key}`);
            break;
          }
        }
      }
      if (arContext) {
        console.log('AR.js context acquired');
      } else {
        console.warn('AR.js context not found — marker detection may not update');
      }

      // Get marker entity and its THREE.Group
      const markerEl = document.getElementById('ar-marker');
      markerRoot = markerEl.object3D;

      // Build face overlay
      buildFaceOverlay();

      // Start MediaPipe
      initMediaPipe();
    });
  }
});

// Attach component to scene
document.querySelector('a-scene').setAttribute('face-mesh-detector', '');

// ─── Build Face Overlay (child of marker) ───────────────────────────────
function buildFaceOverlay() {
  faceCanvas.width  = faceCanvasW;
  faceCanvas.height = faceCanvasH;

  faceTexture = new THREE.CanvasTexture(faceCanvas);
  faceTexture.minFilter = THREE.LinearFilter;
  faceTexture.magFilter = THREE.LinearFilter;

  const geo = new THREE.PlaneGeometry(1, 1);
  const mat = new THREE.MeshBasicMaterial({
    map: faceTexture,
    transparent: true,
    depthTest: false,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending,
    opacity: FACE_OPACITY,
  });

  facePlane = new THREE.Mesh(geo, mat);
  facePlane.renderOrder = 999;
  facePlane.visible = false;
  markerRoot.add(facePlane);
}

// ─── MediaPipe Initialization ───────────────────────────────────────────
function initMediaPipe() {
  const faceMesh = new FaceMesh({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/${f}`,
  });

  faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
  });

  faceMesh.onResults(results => {
    faceLandmarks = (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) || [];
    if (!faceReady) {
      faceReady = true;
      loadingEl.style.display = 'none';
      console.log('MediaPipe Face Mesh ready');
    }
  });

  const cam = new Camera(video, {
    onFrame: async () => { await faceMesh.send({ image: video }); },
    width: 640,
    height: 480,
  });
  cam.start().then(() => {
    faceCanvasW = video.videoWidth  || 640;
    faceCanvasH = video.videoHeight || 480;
    faceCanvas.width  = faceCanvasW;
    faceCanvas.height = faceCanvasH;
    console.log(`Video: ${faceCanvasW}x${faceCanvasH}`);
  });
}

// ─── Draw Face Mesh onto Canvas ─────────────────────────────────────────
function drawFaceCanvas() {
  faceCtx.clearRect(0, 0, faceCanvasW, faceCanvasH);
  if (faceLandmarks.length === 0) return;

  const W = faceCanvasW;
  const H = faceCanvasH;
  const [r, g, b] = FACE_COLOR;

  // Triangulated fill + wireframe
  faceCtx.lineWidth   = 1;
  faceCtx.strokeStyle = `rgba(${r},${g},${b},0.35)`;
  faceCtx.fillStyle   = `rgba(${r},${g},${b},0.04)`;

  for (let i = 0; i < FACE_TRIANGULATION.length; i += 3) {
    const a = faceLandmarks[FACE_TRIANGULATION[i]];
    const bL = faceLandmarks[FACE_TRIANGULATION[i + 1]];
    const c = faceLandmarks[FACE_TRIANGULATION[i + 2]];
    if (!a || !bL || !c) continue;

    faceCtx.beginPath();
    faceCtx.moveTo(a.x * W, a.y * H);
    faceCtx.lineTo(bL.x * W, bL.y * H);
    faceCtx.lineTo(c.x * W, c.y * H);
    faceCtx.closePath();
    faceCtx.fill();
    faceCtx.stroke();
  }

  // Landmark points
  faceCtx.fillStyle = `rgba(${r},${g},${b},0.9)`;
  for (const lm of faceLandmarks) {
    faceCtx.beginPath();
    faceCtx.arc(lm.x * W, lm.y * H, 2, 0, Math.PI * 2);
    faceCtx.fill();
  }

  faceTexture.needsUpdate = true;
}

// ─── Inverse Projection: NDC → Camera Space ─────────────────────────────
function unprojectNDC(nx, ny, p) {
  // p = camera.projectionMatrix.elements (column-major Float32Array)
  const ax = (nx * p[15] - p[12]) / (nx * p[11] - p[8]);
  const ay = (ny * p[15] - p[13]) / (ny * p[11] - p[9]);
  const bw = nx * p[11] - p[10];
  const bz = nx * p[15] - p[14];
  const az = bw / bz;
  return [ax * az, ay * az, az];
}

// ─── Project Face Landmarks onto Marker Plane ───────────────────────────
function projectFaceOnMarker() {
  if (faceLandmarks.length === 0 || !markerRoot.visible) {
    if (facePlane) facePlane.visible = false;
    return;
  }

  // Marker world transform and its inverse
  markerRoot.updateMatrixWorld(true);
  const mWorld = markerRoot.matrixWorld.elements;
  // Invert 4×4 (column-major) — optimized for transform matrices
  const m = mWorld;
  const inv = new Float32Array(16);
  // Extract rotation 3×3 and translation
  const a00=m[0],a01=m[1],a02=m[2],
        a10=m[4],a11=m[5],a12=m[6],
        a20=m[8],a21=m[9],a22=m[10],
        tx=m[12],ty=m[13],tz=m[14];
  // 3×3 inverse
  const det = a00*(a11*a22-a12*a21) - a01*(a10*a22-a12*a20) + a02*(a10*a21-a11*a20);
  if (Math.abs(det) < 1e-10) return;
  const id = 1 / det;
  const r00 = (a11*a22-a12*a21)*id, r01 = (a02*a21-a01*a22)*id, r02 = (a01*a12-a02*a11)*id;
  const r10 = (a12*a20-a10*a22)*id, r11 = (a00*a22-a02*a20)*id, r12 = (a02*a10-a00*a12)*id;
  const r20 = (a10*a21-a11*a20)*id, r21 = (a01*a20-a00*a21)*id, r22 = (a00*a11-a01*a10)*id;
  inv[0]=r00; inv[1]=r10; inv[2]=r20; inv[3]=0;
  inv[4]=r01; inv[5]=r11; inv[6]=r21; inv[7]=0;
  inv[8]=r02; inv[9]=r12; inv[10]=r22; inv[11]=0;
  inv[12]=-(r00*tx+r01*ty+r02*tz);
  inv[13]=-(r10*tx+r11*ty+r12*tz);
  inv[14]=-(r20*tx+r21*ty+r22*tz);
  inv[15]=1;

  // Camera world matrix
  threeCamera.updateMatrixWorld(true);
  const cWorld = threeCamera.matrixWorld.elements;

  const projMatrix = threeCamera.projectionMatrix.elements;
  const localPts = [];
  let uMin=Infinity, vMin=Infinity, uMax=-Infinity, vMax=-Infinity;

  for (const lm of faceLandmarks) {
    const nx =  lm.x * 2 - 1;   // NDC x
    const ny = -lm.y * 2 + 1;   // NDC y

    // Unproject NDC → camera space
    const [cx, cy, cz] = unprojectNDC(nx, ny, projMatrix);

    // Camera space → world space
    const wx = cWorld[0]*cx + cWorld[4]*cy + cWorld[8]*cz + cWorld[12];
    const wy = cWorld[1]*cx + cWorld[5]*cy + cWorld[9]*cz + cWorld[13];
    const wz = cWorld[2]*cx + cWorld[6]*cy + cWorld[10]*cz + cWorld[14];

    // World → marker local space
    const lx = inv[0]*wx + inv[4]*wy + inv[8]*wz + inv[12];
    const ly = inv[1]*wx + inv[5]*wy + inv[9]*wz + inv[13];
    const lz = inv[2]*wx + inv[6]*wy + inv[10]*wz + inv[14];

    localPts.push([lx, ly, lz]);
    if (lx < uMin) uMin = lx;
    if (lx > uMax) uMax = lx;
    if (ly < vMin) vMin = ly;
    if (ly > vMax) vMax = ly;
  }

  // Update face plane (texture mapped)
  const uw = uMax - uMin;
  const vh = vMax - vMin;
  if (uw < 0.01 || vh < 0.01) { facePlane.visible = false; return; }

  const cx = (uMin + uMax) / 2;
  const cy = (vMin + vMax) / 2;

  facePlane.position.set(cx, cy, PLANE_OFFSET);
  facePlane.scale.set(uw * 1.1, vh * 1.1, 1);
  facePlane.visible = true;

  // Update 3D point cloud
  if (facePointsMesh) {
    markerRoot.remove(facePointsMesh);
    facePointsMesh.geometry.dispose();
    facePointsMesh.material.dispose();
  }

  const positions = new Float32Array(localPts.length * 3);
  for (let i = 0; i < localPts.length; i++) {
    positions[i * 3]     = localPts[i][0] - cx;
    positions[i * 3 + 1] = localPts[i][1] - cy;
    positions[i * 3 + 2] = PLANE_OFFSET * 2;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  const [r, g, b] = FACE_COLOR;
  facePointsMesh = new THREE.Points(geo, new THREE.PointsMaterial({
    size: POINT_SIZE,
    color: new THREE.Color(r/255, g/255, b/255),
    transparent: true,
    opacity: 0.8,
    depthTest: false,
    depthWrite: false,
  }));
  facePointsMesh.renderOrder = 1000;
  facePointsMesh.position.set(cx, cy, PLANE_OFFSET * 2);
  markerRoot.add(facePointsMesh);
}

// ─── Animation Loop (runs on A-Frame tick) ──────────────────────────────
AFRAME.registerComponent('ar-render-loop', {
  tick: function () {
    if (!faceReady) return;

    // Update AR source
    if (arSource && arSource.ready && arContext) {
      arContext.update(arSource.domElement);
    }

    // Draw face mesh on canvas texture
    drawFaceCanvas();

    // HUD: hide when marker visible
    hudEl.style.opacity = markerRoot && markerRoot.visible ? '0' : '1';

    // Project face onto marker
    projectFaceOnMarker();
  }
});
document.querySelector('a-scene').setAttribute('ar-render-loop', '');
</script>
</body>
