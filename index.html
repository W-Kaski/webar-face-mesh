<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Face Mesh AR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:system-ui}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
#loading{
  position:fixed;inset:0;z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.92);color:#fff;gap:16px;
}
.spinner{
  width:44px;height:44px;
  border:3px solid rgba(255,255,255,0.12);border-top-color:#64ffda;
  border-radius:50%;animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:13px;color:rgba(255,255,255,0.6);text-align:center;line-height:1.8}
#btn{
  margin-top:12px;padding:10px 28px;border:none;border-radius:20px;
  background:#64ffda;color:#000;font-size:14px;font-weight:600;
  cursor:pointer;display:none;
}
#hud{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:50;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);color:rgba(255,255,255,0.85);
  padding:8px 20px;border-radius:20px;font-size:12px;
  pointer-events:none;opacity:0;transition:opacity 0.5s;
}
#mode-btn{
  position:fixed;top:16px;right:16px;z-index:50;
  padding:8px 16px;border:1px solid rgba(255,255,255,0.2);border-radius:16px;
  background:rgba(0,0,0,0.4);backdrop-filter:blur(6px);color:#fff;font-size:12px;
  cursor:pointer;
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p id="status">Loading Face Mesh model…</p>
  <button id="btn" onclick="startCamera()">Start Camera</button>
</div>
<div id="hud">Move your face in front of the camera</div>
<button id="mode-btn">Switch Mode</button>
<canvas id="c"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

'use strict';

// ─── Config ─────────────────────────────────────────────────────────────
const COLOR    = [100, 255, 218];   // #64ffda
const POINT_SZ = 0.006;
const modes    = ['wireframe', 'pointcloud', 'solid', 'glow'];
let modeIdx    = 0;

// ─── State ──────────────────────────────────────────────────────────────
let faceLandmarks = [];
let faceReady     = false;
let W = 640, H = 480;

// ─── DOM ────────────────────────────────────────────────────────────────
const canvasEl  = document.getElementById('c');
const loadingEl = document.getElementById('loading');
const statusEl  = document.getElementById('status');
const btnEl     = document.getElementById('btn');
const hudEl     = document.getElementById('hud');
const modeBtnEl = document.getElementById('mode-btn');

// ─── Three.js Scene ─────────────────────────────────────────────────────
const scene    = new THREE.Scene();
const camera   = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 1);

// Face group (all face visuals live here)
const faceGroup = new THREE.Group();
scene.add(faceGroup);

// ─── MediaPipe Face Mesh ───────────────────────────────────────────────
let faceMeshInstance = null;

async function loadFaceMesh() {
  faceMeshInstance = new FaceMesh({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/${f}`,
  });
  faceMeshInstance.setOptions({
    maxNumFaces: 1,
    refineLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
  });
  faceMeshInstance.onResults(onFaceResults);

  // Pre-warm: send a blank frame to trigger model download
  statusEl.textContent = 'Downloading model (≈2MB)…';
  const dummyCanvas = document.createElement('canvas');
  dummyCanvas.width = 64; dummyCanvas.height = 48;
  await faceMeshInstance.send({ image: dummyCanvas });
  statusEl.textContent = 'Model loaded!';
  btnEl.style.display = 'block';
}

function onFaceResults(results) {
  faceLandmarks = (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) || [];
  if (!faceReady && faceLandmarks.length > 0) {
    faceReady = true;
    loadingEl.style.display = 'none';
    hudEl.style.opacity = '1';
    setTimeout(() => hudEl.style.opacity = '0', 3000);
  }
}

// ─── Camera ─────────────────────────────────────────────────────────────
async function startCamera() {
  btnEl.style.display = 'none';
  statusEl.textContent = 'Requesting camera…';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    const video = document.createElement('video');
    video.srcObject = stream;
    video.setAttribute('playsinline', '');
    await video.play();
    W = video.videoWidth  || 640;
    H = video.videoHeight || 480;

    statusEl.textContent = `Camera ${W}×${H} — tracking…`;

    // Feed frames to MediaPipe
    async function loop() {
      if (video.readyState >= 2) {
        await faceMeshInstance.send({ image: video });
      }
      requestAnimationFrame(loop);
    }
    loop();

    // Hide loading once face detected
  } catch (err) {
    statusEl.textContent = `Camera error: ${err.message}\nReload to retry.`;
    console.error(err);
  }
}

// ─── Landmark → NDC (screen coords) ────────────────────────────────────
function lmToNDC(lm) {
  // Mirror X for selfie view
  return { x: -(lm.x * 2 - 1), y: -(lm.y * 2 - 1), z: -lm.z };
}

// ─── Build 3D Face Mesh (per mode) ─────────────────────────────────────
let prevMesh = null;
const [CR, CG, CB] = [COLOR[0]/255, COLOR[1]/255, COLOR[2]/255];

function buildFaceMesh() {
  // Clear previous
  while (faceGroup.children.length > 0) {
    const c = faceGroup.children[0];
    if (c.geometry) c.geometry.dispose();
    if (c.material) c.material.dispose();
    faceGroup.remove(c);
  }

  if (faceLandmarks.length === 0) return;

  const mode = modes[modeIdx];

  if (mode === 'pointcloud') {
    // ── Point Cloud ──
    const positions = new Float32Array(faceLandmarks.length * 3);
    for (let i = 0; i < faceLandmarks.length; i++) {
      const p = lmToNDC(faceLandmarks[i]);
      positions[i*3] = p.x; positions[i*3+1] = p.y; positions[i*3+2] = p.z * 0.3;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({
      size: POINT_SZ * 2, color: new THREE.Color(CR, CG, CB),
      transparent: true, opacity: 0.9, depthTest: false,
    });
    faceGroup.add(new THREE.Points(geo, mat));

  } else if (mode === 'wireframe' || mode === 'solid' || mode === 'glow') {
    // ── Triangulated Mesh ──
    const positions = new Float32Array(faceLandmarks.length * 3);
    for (let i = 0; i < faceLandmarks.length; i++) {
      const p = lmToNDC(faceLandmarks[i]);
      positions[i*3] = p.x; positions[i*3+1] = p.y; positions[i*3+2] = p.z * 0.3;
    }

    const indices = [];
    for (let i = 0; i < TRI.length; i += 3) {
      const a = TRI[i], b = TRI[i+1], c = TRI[i+2];
      if (a < faceLandmarks.length && b < faceLandmarks.length && c < faceLandmarks.length) {
        indices.push(a, b, c);
      }
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setIndex(indices);
    geo.computeVertexNormals();

    if (mode === 'solid') {
      const mat = new THREE.MeshBasicMaterial({
        color: new THREE.Color(CR * 0.4, CG * 0.4, CB * 0.4),
        transparent: true, opacity: 0.6, side: THREE.DoubleSide,
        depthTest: false,
      });
      faceGroup.add(new THREE.Mesh(geo, mat));

      // Wireframe overlay
      const wmat = new THREE.LineBasicMaterial({
        color: new THREE.Color(CR, CG, CB), transparent: true, opacity: 0.5,
      });
      const wgeo = new THREE.WireframeGeometry(geo);
      faceGroup.add(new THREE.LineSegments(wgeo, wmat));

    } else if (mode === 'glow') {
      // Layered glow effect
      for (let layer = 3; layer >= 0; layer--) {
        const scale = 1 + layer * 0.008;
        const opacity = 0.15 + (3 - layer) * 0.2;
        const mat = new THREE.MeshBasicMaterial({
          color: new THREE.Color(CR, CG, CB),
          transparent: true, opacity, side: THREE.DoubleSide,
          depthTest: false, wireframe: layer > 0,
        });
        const mesh = new THREE.Mesh(geo.clone(), mat);
        mesh.scale.set(scale, scale, scale);
        faceGroup.add(mesh);
      }

    } else {
      // Wireframe
      const wgeo = new THREE.WireframeGeometry(geo);
      const mat = new THREE.LineBasicMaterial({
        color: new THREE.Color(CR, CG, CB), transparent: true, opacity: 0.7,
      });
      faceGroup.add(new THREE.LineSegments(wgeo, mat));

      // Point overlay
      const pmat = new THREE.PointsMaterial({
        size: POINT_SZ, color: new THREE.Color(CR, CG, CB),
        transparent: true, opacity: 0.5, depthTest: false,
      });
      const pgeo = new THREE.BufferGeometry();
      pgeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      faceGroup.add(new THREE.Points(pgeo, pmat));
    }
  }
}

// ─── Mode Switch ────────────────────────────────────────────────────────
modeBtnEl.addEventListener('click', () => {
  modeIdx = (modeIdx + 1) % modes.length;
  modeBtnEl.textContent = modes[modeIdx].toUpperCase();
});
modeBtnEl.textContent = modes[modeIdx].toUpperCase();

// ─── Resize ─────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Render Loop ────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  buildFaceMesh();
  renderer.render(scene, camera);
}
animate();

// ─── Bootstrap ──────────────────────────────────────────────────────────
loadFaceMesh().catch(err => {
  statusEl.textContent = `Model load failed: ${err.message}\nCheck network and reload.`;
  console.error(err);
});
