<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hand Quads</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:system-ui}
#video{
  position:fixed;top:0;left:0;width:100%;height:100%;
  object-fit:cover;z-index:0;transform:scaleX(-1);
}
#three-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
#loading{
  position:fixed;inset:0;z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.92);color:#fff;gap:16px;
}
.spinner{
  width:44px;height:44px;
  border:3px solid rgba(255,255,255,0.12);border-top-color:#64ffda;
  border-radius:50%;animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:13px;color:rgba(255,255,255,0.6);text-align:center;line-height:1.8}
#btn{
  margin-top:12px;padding:10px 28px;border:none;border-radius:20px;
  background:#64ffda;color:#000;font-size:14px;font-weight:600;
  cursor:pointer;display:none;
}
#hud{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:50;
  background:rgba(0,0,0,0.45);backdrop-filter:blur(6px);color:rgba(255,255,255,0.85);
  padding:8px 20px;border-radius:20px;font-size:12px;
  pointer-events:none;opacity:0;transition:opacity 0.5s;
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p id="status">Loading models…</p>
  <button id="btn" onclick="startCamera()">Start Camera</button>
</div>
<div id="hud">Show both hands to the camera</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="three-canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.1/selfie_segmentation.js"></script>

<script>
'use strict';

// ─── Config ─────────────────────────────────────────────────────────────
const QUAD_COUNT = 3;
const FINGER_TIPS = [4, 8, 12, 20]; // thumb, index, middle, pinky (skip ring)
const QUAD_COLORS = [
  [0.96, 0.96, 0.91],  // white  (thumb↔index)
  [0.04, 0.16, 0.28],  // blue   (index↔middle)
  [0.96, 0.96, 0.91],  // white  (middle↔pinky)
];
const STRIP_OPACITY = 0.94;

// ─── State ──────────────────────────────────────────────────────────────
let handData = [];
let faceLandmarks = [];
let smoothHands = [null, null];
let faceTextureReady = false;

// Person mask (from SelfieSegmentation)
const personMaskCanvas = document.createElement('canvas');
personMaskCanvas.width = 256;
personMaskCanvas.height = 256;
const personMaskCtx = personMaskCanvas.getContext('2d', { willReadFrequently: true });
let personMaskData = null;  // Uint8ClampedArray (RGBA)
let segmentationInstance = null;

// ─── DOM ────────────────────────────────────────────────────────────────
const videoEl   = document.getElementById('video');
const canvasEl  = document.getElementById('three-canvas');
const loadingEl = document.getElementById('loading');
const statusEl  = document.getElementById('status');
const btnEl     = document.getElementById('btn');
const hudEl     = document.getElementById('hud');

// ─── Three.js Setup ─────────────────────────────────────────────────────
const scene  = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const renderer = new THREE.WebGLRenderer({
  canvas: canvasEl, alpha: true, antialias: true,
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);

// ─── Material Textures ─────────────────────────────────────────────────
const TEX_SIZE = 512;

function createTextureLayer() {
  const canvas = document.createElement('canvas');
  canvas.width = TEX_SIZE;
  canvas.height = TEX_SIZE;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  texture.magFilter = THREE.LinearFilter;
  return { canvas, ctx, texture };
}

const textureLayers = {
  whiteTop: createTextureLayer(),
  blueMid: createTextureLayer(),
  whiteBottom: createTextureLayer(),
};

const quadMaterials = [
  { layer: textureLayers.whiteTop, uvOffset: 0.0, uvScale: 1.0, base: [0.96, 0.96, 0.91], edgeA: [0.72, 0.05, 0.13], edgeB: [0.72, 0.05, 0.13] },
  { layer: textureLayers.blueMid, uvOffset: 0.0, uvScale: 1.0, base: [0.04, 0.16, 0.28], edgeA: [0.02, 0.10, 0.20], edgeB: [0.06, 0.22, 0.36] },
  { layer: textureLayers.whiteBottom, uvOffset: 0.0, uvScale: 1.0, base: [0.96, 0.96, 0.91], edgeA: [0.72, 0.05, 0.13], edgeB: [0.72, 0.05, 0.13] },
];

// --- mask code commented out for now ---
// function ellipseContains(x, y, cx, cy, rx, ry) {
//   const dx = (x - cx) / rx;
//   const dy = (y - cy) / ry;
//   return dx * dx + dy * dy <= 1;
// }
// function handOcclusion(x, y) { ... }
// function sampleMask(x, y, fallbackShift) { ... }
// function drawFaceShadow(ctx, color, alpha, offsetX) { ... }

// Sample person mask at texture coordinates (0..1)
function samplePerson(u, v) {
  if (!personMaskData) return 0;
  const px = Math.max(0, Math.min(255, Math.floor(u * 256)));
  const py = Math.max(0, Math.min(255, Math.floor(v * 256)));
  const i = (py * 256 + px) * 4;
  return personMaskData[i] / 255; // segmentation mask is grayscale in R channel
}

// Check if a point is on the edge of the person mask (within radius pixels)
function isEdge(u, v, radius) {
  const m = samplePerson(u, v);
  if (m < 0.3) return false;
  const du = radius / TEX_SIZE;
  const dv = radius / TEX_SIZE;
  return (
    samplePerson(u - du, v) < 0.3 ||
    samplePerson(u + du, v) < 0.3 ||
    samplePerson(u, v - dv) < 0.3 ||
    samplePerson(u, v + dv) < 0.3
  );
}

function drawQuadTexture(layer, baseHex, effectType) {
  const ctx = layer.ctx;
  const S = TEX_SIZE;

  // Base fill
  ctx.fillStyle = baseHex;
  ctx.fillRect(0, 0, S, S);

  if (!personMaskData) {
    layer.texture.needsUpdate = true;
    return;
  }

  const imgData = ctx.getImageData(0, 0, S, S);
  const px = imgData.data;

  const EDGE_RADIUS = 6; // thick outline

  for (let y = 0; y < S; y++) {
    const v = y / S;
    for (let x = 0; x < S; x++) {
      const u = x / S;
      const m = samplePerson(u, v);
      if (m < 0.2) continue;

      const i = (y * S + x) * 4;

      if (effectType === 'redOutline') {
        // Red thick outline on white base
        if (isEdge(u, v, EDGE_RADIUS)) {
          px[i] = 185; px[i+1] = 23; px[i+2] = 48; px[i+3] = 230;
        }
      } else if (effectType === 'whiteSilhouette') {
        // White silhouette on blue base
        px[i] = 245; px[i+1] = 243; px[i+2] = 236; px[i+3] = Math.floor(m * 230);
      } else if (effectType === 'greenOutline') {
        // Green thick outline on white base
        if (isEdge(u, v, EDGE_RADIUS)) {
          px[i] = 10; px[i+1] = 162; px[i+2] = 52; px[i+3] = 230;
        }
      }
    }
  }

  ctx.putImageData(imgData, 0, 0);
  layer.texture.needsUpdate = true;
}

function drawMaterialTextures() {
  drawQuadTexture(textureLayers.whiteTop, '#f5f3ec', 'redOutline');
  drawQuadTexture(textureLayers.blueMid, '#0b3c5d', 'whiteSilhouette');
  drawQuadTexture(textureLayers.whiteBottom, '#f5f3ec', 'greenOutline');
  faceTextureReady = true;
}

drawMaterialTextures();

// ─── Quad Geometry ──────────────────────────────────────────────────────
const quads = [];
const connectionLines = [];
const quadGroup = new THREE.Group();
scene.add(quadGroup);

// Create 3 quads
for (let i = 0; i < QUAD_COUNT; i++) {
  const geo = new THREE.BufferGeometry();
  // 4 vertices × 3 floats + UVs
  const positions = new Float32Array(12);  // 4 corners × 3
  const uvs = new Float32Array([
    0, 1,  1, 1,  1, 0,  0, 0   // quad UV mapping
  ]);
  const indices = [0, 1, 2,  0, 2, 3]; // two triangles
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
  geo.setIndex(indices);

  const materialPlan = quadMaterials[i];
  const [r, g, b] = materialPlan.base;
  const [er1, eg1, eb1] = materialPlan.edgeA;
  const [er2, eg2, eb2] = materialPlan.edgeB;
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthTest: false,
    depthWrite: false,
    side: THREE.DoubleSide,
    uniforms: {
      uTexture: { value: materialPlan.layer.texture },
      uColor:   { value: new THREE.Color(r, g, b) },
      uEdgeA:   { value: new THREE.Color(er1, eg1, eb1) },
      uEdgeB:   { value: new THREE.Color(er2, eg2, eb2) },
      uOpacity: { value: STRIP_OPACITY },
      uGlow:    { value: 0.0 },
      uTime:    { value: 0.0 },
      uUvOffset: { value: materialPlan.uvOffset },
      uUvScale:  { value: materialPlan.uvScale },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform sampler2D uTexture;
      uniform vec3 uColor;
      uniform vec3 uEdgeA;
      uniform vec3 uEdgeB;
      uniform float uOpacity;
      uniform float uGlow;
      uniform float uTime;
      uniform float uUvOffset;
      uniform float uUvScale;
      varying vec2 vUv;

      void main() {
        vec2 stripUv = vec2(vUv.x, uUvOffset + vUv.y * uUvScale);
        vec4 tex = texture2D(uTexture, stripUv);

        vec3 paper = mix(uColor, tex.rgb, 0.92);
        vec3 col = paper;

        float edgeDist = min(min(vUv.x, 1.0 - vUv.x), min(vUv.y, 1.0 - vUv.y));
        float edge = 1.0 - smoothstep(0.0, 0.024, edgeDist);
        col = mix(col, mix(uEdgeA, uEdgeB, step(0.5, vUv.x)), edge * 0.72);

        float crease = smoothstep(0.012, 0.0, abs(vUv.y - 1.0));
        float pulse = 0.5 + 0.5 * sin(uTime * 2.4 + stripUv.x * 8.0);
        col += vec3(0.04, 0.12, 0.18) * crease * 0.35;
        col += vec3(0.0, 0.55, 0.12) * uGlow * 0.12 * pulse;

        float alpha = clamp(uOpacity + edge * 0.04, 0.0, 0.98);

        gl_FragColor = vec4(col, alpha);
      }
    `,
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = 10;
  quadGroup.add(mesh);
  quads.push({ mesh, geo, mat });

  // Connection line (top edge)
  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
  const lineMat = new THREE.LineBasicMaterial({
    color: new THREE.Color(i % 2 ? 0x244a7a : 0xb51a2d), transparent: true, opacity: 0.86,
  });
  const line = new THREE.LineSegments(lineGeo, lineMat);
  line.renderOrder = 5;
  quadGroup.add(line);
  connectionLines.push({ line, geo: lineGeo });
}

// ─── Smoothing ──────────────────────────────────────────────────────────
function smoothLandmarks(prev, curr, factor) {
  if (!prev) return curr.map(p => ({...p}));
  return curr.map((p, i) => ({
    x: prev[i].x + (p.x - prev[i].x) * factor,
    y: prev[i].y + (p.y - prev[i].y) * factor,
    z: prev[i].z + (p.z - prev[i].z) * factor,
  }));
}

// ─── MediaPipe: Hands ───────────────────────────────────────────────────
let handsInstance = null;
let faceMeshInstance = null;
let modelsReady = 0;

async function loadModels() {
  // Hands
  handsInstance = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${f}`,
  });
  handsInstance.setOptions({
    maxNumHands: 2,
    modelComplexity: 0,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.5,
  });
  handsInstance.onResults(onHandResults);

  statusEl.textContent = 'Downloading hand model…';
  // Warm up with a single frame to trigger model download
  const dummy = document.createElement('canvas');
  dummy.width = 64; dummy.height = 48;
  await handsInstance.send({ image: dummy });

  statusEl.textContent = 'Downloading face model…';
  faceMeshInstance = new FaceMesh({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/${f}`,
  });
  faceMeshInstance.setOptions({
    maxNumFaces: 1,
    refineLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
  });
  faceMeshInstance.onResults(onFaceResults);
  await faceMeshInstance.send({ image: dummy });

  // SelfieSegmentation (person mask)
  segmentationInstance = new SelfieSegmentation({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.1/${f}`,
  });
  segmentationInstance.setOptions({ modelSelection: 1 });
  segmentationInstance.onResults(onSegmentationResults);
  statusEl.textContent = 'Downloading segmentation model…';
  await segmentationInstance.send({ image: dummy });

  statusEl.textContent = 'Ready!';
  btnEl.style.display = 'block';
}

function onHandResults(results) {
  const raw = (results.multiHandLandmarks || []).slice();

  if (raw.length === 0) {
    handData = [];
    smoothHands = [null, null];
    return;
  }

  if (raw.length === 2) {
    raw.sort((a, b) => lmToNDC(a[9]).x - lmToNDC(b[9]).x);
  }

  handData = raw;
  const nextSmooth = [null, null];
  for (let h = 0; h < handData.length; h++) {
    nextSmooth[h] = smoothLandmarks(smoothHands[h], handData[h], 0.42);
  }
  smoothHands = nextSmooth;
}

function onFaceResults(results) {
  faceLandmarks = (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) || [];
}

function onSegmentationResults(results) {
  if (results.segmentationMask) {
    personMaskCtx.drawImage(results.segmentationMask, 0, 0, 256, 256);
    personMaskData = personMaskCtx.getImageData(0, 0, 256, 256).data;
  }
}

// ─── Camera ─────────────────────────────────────────────────────────────
async function startCamera() {
  btnEl.style.display = 'none';
  statusEl.textContent = 'Requesting camera…';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    videoEl.srcObject = stream;
    await videoEl.play();

    const W = videoEl.videoWidth || 1280;
    const H = videoEl.videoHeight || 720;
    console.log(`Camera: ${W}×${H}`);

    // Adjust aspect ratio for Three.js
    const aspect = window.innerWidth / window.innerHeight;
    const videoAspect = W / H;
    if (videoAspect > aspect) {
      camera.top = 1; camera.bottom = -1;
      camera.left = -videoAspect / aspect;
      camera.right =  videoAspect / aspect;
    } else {
      camera.left = -1; camera.right = 1;
      camera.top  = aspect / videoAspect;
      camera.bottom = -aspect / videoAspect;
    }
    camera.updateProjectionMatrix();

    statusEl.textContent = 'Tracking…';

    let trackFrame = 0;
    async function loop() {
      if (videoEl.readyState >= 2) {
        if (handsInstance) await handsInstance.send({ image: videoEl });
        trackFrame++;
        if (faceMeshInstance && trackFrame % 3 === 0) {
          await faceMeshInstance.send({ image: videoEl });
        }
        if (segmentationInstance && trackFrame % 5 === 0) {
          await segmentationInstance.send({ image: videoEl });
        }
        if (trackFrame % 5 === 0) drawMaterialTextures();
      }
      requestAnimationFrame(loop);
    }
    loop();

    // Animate
    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.016;
      updateQuads(time);
      renderer.render(scene, camera);
    }
    animate();

    loadingEl.style.display = 'none';
    hudEl.style.opacity = '1';
    setTimeout(() => hudEl.style.opacity = '0', 4000);

  } catch (err) {
    statusEl.textContent = `Camera error: ${err.message}`;
    console.error(err);
  }
}

// ─── Update Quads every frame ───────────────────────────────────────────
const _tmpPos = new Float32Array(12);

function updateQuads(time) {
  const hands = smoothHands;

  if (!hands[0] || !hands[1]) {
    quadGroup.visible = false;
    return;
  }
  quadGroup.visible = true;

  const L = hands[0];
  const R = hands[1];

  const wristGap = Math.abs(lmToNDC(L[0]).x - lmToNDC(R[0]).x);
  const globalGlow = Math.max(0, 1 - wristGap * 1.2);

  const Ltips = FINGER_TIPS.map(idx => ribbonAnchor(L, idx, -1));
  const Rtips = FINGER_TIPS.map(idx => ribbonAnchor(R, idx, 1));

  for (let i = 0; i < QUAD_COUNT; i++) {
    const { mesh, geo, mat } = quads[i];
    const { line, geo: lineGeo } = connectionLines[i];

    // Corner positions from precomputed arrays (shared edges = no gaps)
    const lt = Ltips[i];      // left top
    const rt = Rtips[i];      // right top
    const rb = Rtips[i + 1];  // right bottom
    const lb = Ltips[i + 1];  // left bottom

    const distLT_RT = Math.hypot(lt.x - rt.x, lt.y - rt.y);
    const distLB_RB = Math.hypot(lb.x - rb.x, lb.y - rb.y);
    const distLT_LB = Math.hypot(lt.x - lb.x, lt.y - lb.y);
    const distRT_RB = Math.hypot(rt.x - rb.x, rt.y - rb.y);

    const MERGE_THRESHOLD = 0.045;
    const mergeTop  = distLT_RT < MERGE_THRESHOLD;
    const mergeBot  = distLB_RB < MERGE_THRESHOLD;
    const mergeLeft = distLT_LB < MERGE_THRESHOLD;
    const mergeRight= distRT_RB < MERGE_THRESHOLD;

    const mergeCount = [mergeTop, mergeBot, mergeLeft, mergeRight].filter(Boolean).length;
    if (mergeCount >= 3) {
      mesh.visible = false;
      line.visible = false;
      continue;
    }
    mesh.visible = true;
    line.visible = true;

    let verts;
    if (mergeTop) {
      const top = { x: (lt.x+rt.x)/2, y: (lt.y+rt.y)/2 };
      verts = [top, rb, lb, top];
    } else if (mergeBot) {
      const bot = { x: (lb.x+rb.x)/2, y: (lb.y+rb.y)/2 };
      verts = [lt, rt, bot, bot];
    } else if (mergeLeft) {
      const left = { x: (lt.x+lb.x)/2, y: (lt.y+lb.y)/2 };
      verts = [left, rt, rb, left];
    } else if (mergeRight) {
      const right = { x: (rt.x+rb.x)/2, y: (rt.y+rb.y)/2 };
      verts = [lt, right, right, lb];
    } else {
      verts = [lt, rt, rb, lb];
    }

    const avgZ = (Ltips[i].z + Rtips[i].z + Ltips[i+1].z + Rtips[i+1].z) / 4 || 0;
    const depth = avgZ * 0.15;

    const positions = geo.attributes.position.array;

    for (let v = 0; v < 4; v++) {
      positions[v*3] = verts[v].x;
      positions[v*3+1] = verts[v].y;
      positions[v*3+2] = depth;
    }

    geo.attributes.position.needsUpdate = true;
    geo.computeVertexNormals();

    mat.uniforms.uTime.value = time;
    mat.uniforms.uGlow.value = globalGlow;

    const lp = lineGeo.attributes.position.array;
    lp[0] = verts[0].x; lp[1] = verts[0].y; lp[2] = depth + 0.001;
    lp[3] = verts[1].x; lp[4] = verts[1].y; lp[5] = depth + 0.001;
    lineGeo.attributes.position.needsUpdate = true;
  }
}

// ─── Landmark → NDC (mirrored selfie) ──────────────────────────────────
function lmToNDC(lm) {
  return { x: -(lm.x * 2 - 1), y: -(lm.y * 2 - 1) };
}

// ─── Extend fingertip INWARD toward palm (covers finger body) ───────────
const FINGER_MCP = { 4: 2, 8: 5, 12: 9, 16: 13, 20: 17 }; // tip→MCP joint mapping
const FINGER_PIP = { 4: 3, 8: 6, 12: 10, 16: 14, 20: 18 };

function ribbonAnchor(landmarks, tipIdx, handSide) {
  const tip = landmarks[tipIdx];
  const mcp = landmarks[FINGER_MCP[tipIdx]];
  const pip = landmarks[FINGER_PIP[tipIdx]] || mcp;
  if (!mcp || !pip) return lmToNDC(tip);

  const towardPalm = tipIdx === 4 ? 0.2 : 0.14;
  const x = tip.x + (mcp.x - tip.x) * towardPalm;
  const y = tip.y + (mcp.y - tip.y) * towardPalm;
  const z = tip.z + (pip.z - tip.z) * 0.25;

  const ndc = lmToNDC({ x, y, z });
  const palm = lmToNDC(landmarks[9]);
  const spread = tipIdx === 4 || tipIdx === 20 ? 0.045 : 0.02;
  const dx = ndc.x - palm.x;
  const dy = ndc.y - palm.y;
  const len = Math.hypot(dx, dy) || 1;

  return {
    x: ndc.x + (dx / len) * spread + handSide * 0.006,
    y: ndc.y + (dy / len) * spread,
    z,
  };
}

function extendedTip(landmarks, tipIdx) {
  const tip = landmarks[tipIdx];
  const mcp = landmarks[FINGER_MCP[tipIdx]];
  if (!mcp) return lmToNDC(tip);
  // Direction from MCP toward tip, go 30% PAST MCP (inward toward palm)
  const dx = tip.x - mcp.x;
  const dy = tip.y - mcp.y;
  const ext = { x: tip.x - dx * 0.3, y: tip.y - dy * 0.3, z: tip.z };
  return lmToNDC(ext);
}

// ─── Resize ─────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Face Mesh Triangulation (subset) ───────────────────────────────────
const TRI = [
  127,34,139,11,0,37,232,231,120,72,37,39,128,121,47,232,121,128,
  104,69,67,175,171,148,157,158,133,245,128,114,163,7,144,245,236,54,
