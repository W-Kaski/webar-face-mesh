<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hand Quads</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:system-ui}
#video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;transform:scaleX(-1)}
#three-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
#loading{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.92);color:#fff;gap:16px}
.spinner{width:44px;height:44px;border:3px solid rgba(255,255,255,0.12);border-top-color:#64ffda;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:13px;color:rgba(255,255,255,0.6);text-align:center;line-height:1.8}
#btn{margin-top:12px;padding:10px 28px;border:none;border-radius:20px;background:#64ffda;color:#000;font-size:14px;font-weight:600;cursor:pointer;display:none}
#hud{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:50;background:rgba(0,0,0,0.45);backdrop-filter:blur(6px);color:rgba(255,255,255,0.85);padding:8px 20px;border-radius:20px;font-size:12px;pointer-events:none;opacity:0;transition:opacity 0.5s}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p id="status">Loading models…</p><button id="btn" onclick="startCamera()">Start Camera</button></div>
<div id="hud">Show both hands to the camera</div>
<video id="video" autoplay playsinline muted></video>
<canvas id="three-canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.1/selfie_segmentation.js"></script>

<script>
'use strict';

// ─── Config ─────────────────────────────────────────────────────────────
const QUAD_COUNT = 3;
const FINGER_TIPS = [4, 8, 12, 20]; // thumb, index, middle, pinky
const SMOOTHING = 0.42;

// ─── State ──────────────────────────────────────────────────────────────
let smoothHands = [null, null];
let handsInstance = null;
let segmentationInstance = null;
let videoTexture = null;
let maskTexture = null;
let hasMask = false;

// ─── DOM ────────────────────────────────────────────────────────────────
const videoEl = document.getElementById('video');
const canvasEl = document.getElementById('three-canvas');
const loadingEl = document.getElementById('loading');
const statusEl = document.getElementById('status');
const btnEl = document.getElementById('btn');
const hudEl = document.getElementById('hud');

// ─── Three.js ───────────────────────────────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);

// ─── Dummy textures (prevent shader errors before real textures arrive) ──
const DUMMY_TEX = new THREE.DataTexture(new Uint8Array([0,0,0,255]), 1, 1, THREE.RGBAFormat);
DUMMY_TEX.needsUpdate = true;

const DUMMY_MASK = new THREE.DataTexture(new Uint8Array([0,0,0,255]), 1, 1, THREE.RGBAFormat);
DUMMY_MASK.needsUpdate = true;

// ─── Shader ─────────────────────────────────────────────────────────────
const VERT = `
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

const FRAG = `
  precision mediump float;
  uniform sampler2D uVideo;
  uniform sampler2D uMask;
  uniform float uEffectType;
  uniform vec3 uBaseColor;
  uniform vec3 uEdgeColor;
  uniform float uTime;
  uniform float uHasMask;
  varying vec2 vUv;

  void main() {
    vec2 uv = vec2(1.0 - vUv.x, vUv.y);
    float m = texture2D(uMask, uv).r;

    // No mask yet → solid base color
    if (uHasMask < 0.5 || m < 0.2) {
      gl_FragColor = vec4(uBaseColor, 0.96);
      return;
    }

    vec3 col = uBaseColor;
    float alpha = 0.96;

    // Edge detection (4-neighbor sampling)
    float e = 0.008;
    float mR = texture2D(uMask, uv + vec2(e, 0.0)).r;
    float mL = texture2D(uMask, uv - vec2(e, 0.0)).r;
    float mU = texture2D(uMask, uv + vec2(0.0, e)).r;
    float mD = texture2D(uMask, uv - vec2(0.0, e)).r;
    float edge = max(max(abs(m - mR), abs(m - mL)), max(abs(m - mU), abs(m - mD)));

    if (uEffectType < 0.5) {
      // Red outline
      if (edge > 0.08) { col = uEdgeColor; alpha = 0.95; }
    } else if (uEffectType < 1.5) {
      // White silhouette
      col = uEdgeColor;
      alpha = m * 0.9;
    } else {
      // Green outline
      if (edge > 0.08) { col = uEdgeColor; alpha = 0.95; }
    }

    gl_FragColor = vec4(col, alpha);
  }
`;

// ─── Effect definitions ─────────────────────────────────────────────────
const EFFECTS = [
  { type: 0, base: [0.96, 0.96, 0.91], edge: [0.72, 0.05, 0.13] },
  { type: 1, base: [0.04, 0.16, 0.28], edge: [0.96, 0.96, 0.91] },
  { type: 2, base: [0.96, 0.96, 0.91], edge: [0.10, 0.55, 0.18] },
];

// ─── Build quads ────────────────────────────────────────────────────────
const quads = [];
const lines = [];
const quadGroup = new THREE.Group();
scene.add(quadGroup);

for (let i = 0; i < QUAD_COUNT; i++) {
  const eff = EFFECTS[i];

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(12), 3));
  geo.setAttribute('uv', new THREE.BufferAttribute(new Float32Array([0,1, 1,1, 1,0, 0,0]), 2));
  geo.setIndex([0, 1, 2, 0, 2, 3]);

  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthTest: false,
    depthWrite: false,
    side: THREE.DoubleSide,
    uniforms: {
      uVideo:     { value: DUMMY_TEX },
      uMask:      { value: DUMMY_MASK },
      uEffectType:{ value: eff.type },
      uBaseColor: { value: new THREE.Color(eff.base[0], eff.base[1], eff.base[2]) },
      uEdgeColor: { value: new THREE.Color(eff.edge[0], eff.edge[1], eff.edge[2]) },
      uTime:      { value: 0 },
      uHasMask:   { value: 0 },
    },
    vertexShader: VERT,
    fragmentShader: FRAG,
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = 10;
  quadGroup.add(mesh);

  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
  const lineMat = new THREE.LineBasicMaterial({
    color: new THREE.Color(i === 1 ? 0x0b3c5d : 0xb51a2d),
    transparent: true, opacity: 0.86,
  });
  const line = new THREE.LineSegments(lineGeo, lineMat);
  line.renderOrder = 5;
  quadGroup.add(line);

  quads.push({ mesh, geo, mat });
  lines.push({ line, geo: lineGeo });
}

// ─── Helpers ────────────────────────────────────────────────────────────
function lmToNDC(lm) { return { x: -(lm.x * 2 - 1), y: -(lm.y * 2 - 1) }; }

function smoothLandmarks(prev, curr, factor) {
  if (!prev) return curr.map(p => ({...p}));
  return curr.map((p, i) => ({
    x: prev[i].x + (p.x - prev[i].x) * factor,
    y: prev[i].y + (p.y - prev[i].y) * factor,
    z: prev[i].z + (p.z - prev[i].z) * factor,
  }));
}

const FINGER_MCP = { 4: 2, 8: 5, 12: 9, 16: 13, 20: 17 };
const FINGER_PIP = { 4: 3, 8: 6, 12: 10, 16: 14, 20: 18 };

function ribbonAnchor(landmarks, tipIdx, handSide) {
  const tip = landmarks[tipIdx];
  const mcp = landmarks[FINGER_MCP[tipIdx]];
  const pip = landmarks[FINGER_PIP[tipIdx]] || mcp;
  if (!mcp || !pip) return lmToNDC(tip);
  const t = tipIdx === 4 ? 0.2 : 0.14;
  const x = tip.x + (mcp.x - tip.x) * t;
  const y = tip.y + (mcp.y - tip.y) * t;
  const z = tip.z + (pip.z - tip.z) * 0.25;
  const ndc = lmToNDC({ x, y, z });
  const palm = lmToNDC(landmarks[9]);
  const spread = tipIdx === 4 || tipIdx === 20 ? 0.045 : 0.02;
  const dx = ndc.x - palm.x, dy = ndc.y - palm.y;
  const len = Math.hypot(dx, dy) || 1;
  return { x: ndc.x + (dx / len) * spread + handSide * 0.006, y: ndc.y + (dy / len) * spread, z };
}

// ─── MediaPipe callbacks ────────────────────────────────────────────────
function onHandResults(results) {
  const raw = (results.multiHandLandmarks || []).slice();
  if (raw.length === 0) { smoothHands = [null, null]; return; }
  if (raw.length === 2) raw.sort((a, b) => lmToNDC(a[9]).x - lmToNDC(b[9]).x);
  const next = [null, null];
  for (let h = 0; h < raw.length; h++) next[h] = smoothLandmarks(smoothHands[h], raw[h], SMOOTHING);
  smoothHands = next;
}

function onSegmentationResults(results) {
  if (!results.segmentationMask) return;
  if (!maskTexture) {
    maskTexture = new THREE.Texture(results.segmentationMask);
    maskTexture.minFilter = THREE.LinearFilter;
    maskTexture.magFilter = THREE.LinearFilter;
    maskTexture.generateMipmaps = false;
  } else {
    maskTexture.image = results.segmentationMask;
  }
  maskTexture.needsUpdate = true;
  hasMask = true;
}

// ─── Load models ────────────────────────────────────────────────────────
async function loadModels() {
  const dummy = document.createElement('canvas');
  dummy.width = 64; dummy.height = 48;

  statusEl.textContent = 'Downloading hand model…';
  handsInstance = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${f}` });
  handsInstance.setOptions({ maxNumHands: 2, modelComplexity: 0, minDetectionConfidence: 0.6, minTrackingConfidence: 0.5 });
  handsInstance.onResults(onHandResults);
  await handsInstance.send({ image: dummy });

  statusEl.textContent = 'Downloading segmentation model…';
  segmentationInstance = new SelfieSegmentation({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.1/${f}` });
  segmentationInstance.setOptions({ modelSelection: 1 });
  segmentationInstance.onResults(onSegmentationResults);
  await segmentationInstance.send({ image: dummy });

  statusEl.textContent = 'Ready!';
  btnEl.style.display = 'block';
}

// ─── Camera + render ───────────────────────────────────────────────────
async function startCamera() {
  btnEl.style.display = 'none';
  statusEl.textContent = 'Requesting camera…';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    videoEl.srcObject = stream;
    await videoEl.play();

    videoTexture = new THREE.VideoTexture(videoEl);
    videoTexture.minFilter = THREE.LinearFilter;
    videoTexture.magFilter = THREE.LinearFilter;
    videoTexture.generateMipmaps = false;

    // Set video texture on all quads
    for (const q of quads) q.mat.uniforms.uVideo.value = videoTexture;

    // Aspect ratio
    const W = videoEl.videoWidth || 1280;
    const H = videoEl.videoHeight || 720;
    const aspect = window.innerWidth / window.innerHeight;
    const va = W / H;
    if (va > aspect) { camera.left = -va/aspect; camera.right = va/aspect; camera.top = 1; camera.bottom = -1; }
    else { camera.left = -1; camera.right = 1; camera.top = aspect/va; camera.bottom = -aspect/va; }
    camera.updateProjectionMatrix();

    // Tracking loop (separate from render)
    let frame = 0;
    async function track() {
      if (videoEl.readyState >= 2) {
        if (handsInstance) await handsInstance.send({ image: videoEl });
        frame++;
        if (segmentationInstance && frame % 5 === 0) await segmentationInstance.send({ image: videoEl });
      }
      requestAnimationFrame(track);
    }
    track();

    // Render loop
    const t0 = performance.now();
    function render(now) {
      const time = (now - t0) / 1000;
      const currentMask = maskTexture || DUMMY_MASK;

      for (const q of quads) {
        q.mat.uniforms.uMask.value = currentMask;
        q.mat.uniforms.uHasMask.value = hasMask ? 1.0 : 0.0;
        q.mat.uniforms.uTime.value = time;
      }

      updateQuads(time);
      renderer.render(scene, camera);
      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);

    loadingEl.style.display = 'none';
    hudEl.style.opacity = '1';
    setTimeout(() => hudEl.style.opacity = '0', 4000);
  } catch (err) {
    statusEl.textContent = `Camera error: ${err.message}`;
    btnEl.style.display = 'block';
  }
}

// ─── Update quad positions ──────────────────────────────────────────────
function updateQuads(time) {
  const hands = smoothHands;
  if (!hands[0] || !hands[1]) { quadGroup.visible = false; return; }
  quadGroup.visible = true;

  const L = hands[0], R = hands[1];
  const Ltips = FINGER_TIPS.map(idx => ribbonAnchor(L, idx, -1));
  const Rtips = FINGER_TIPS.map(idx => ribbonAnchor(R, idx, 1));

  for (let i = 0; i < QUAD_COUNT; i++) {
    const { mesh, geo } = quads[i];
    const { line, geo: lineGeo } = lines[i];
    const lt = Ltips[i], rt = Rtips[i], rb = Rtips[i+1], lb = Ltips[i+1];

    // Degenerate → triangle merge
    const MT = 0.045;
    const mergeTop = Math.hypot(lt.x-rt.x, lt.y-rt.y) < MT;
    const mergeBot = Math.hypot(lb.x-rb.x, lb.y-rb.y) < MT;
    const mergeL   = Math.hypot(lt.x-lb.x, lt.y-lb.y) < MT;
    const mergeR   = Math.hypot(rt.x-rb.x, rt.y-rb.y) < MT;
    if ([mergeTop, mergeBot, mergeL, mergeR].filter(Boolean).length >= 3) {
      mesh.visible = false; line.visible = false; continue;
    }
    mesh.visible = true; line.visible = true;

    let v;
    if (mergeTop) { const t={x:(lt.x+rt.x)/2,y:(lt.y+rt.y)/2}; v=[t,rb,lb,t]; }
    else if (mergeBot) { const b={x:(lb.x+rb.x)/2,y:(lb.y+rb.y)/2}; v=[lt,rt,b,b]; }
    else if (mergeL) { const l={x:(lt.x+lb.x)/2,y:(lt.y+lb.y)/2}; v=[l,rt,rb,l]; }
    else if (mergeR) { const r={x:(rt.x+rb.x)/2,y:(rt.y+rb.y)/2}; v=[lt,r,r,lb]; }
    else { v = [lt, rt, rb, lb]; }

    const depth = (Ltips[i].z + Rtips[i].z + Ltips[i+1].z + Rtips[i+1].z) / 4 * 0.15 || 0;
    const pos = geo.attributes.position.array;
    for (let j = 0; j < 4; j++) { pos[j*3]=v[j].x; pos[j*3+1]=v[j].y; pos[j*3+2]=depth; }
    geo.attributes.position.needsUpdate = true;

    const lp = lineGeo.attributes.position.array;
    lp[0]=v[0].x; lp[1]=v[0].y; lp[2]=depth+0.001;
    lp[3]=v[1].x; lp[4]=v[1].y; lp[5]=depth+0.001;
    lineGeo.attributes.position.needsUpdate = true;
  }
}

// ─── Resize ─────────────────────────────────────────────────────────────
window.addEventListener('resize', () => renderer.setSize(window.innerWidth, window.innerHeight));

// ─── Bootstrap ──────────────────────────────────────────────────────────
loadModels().catch(err => { statusEl.textContent = `Error: ${err.message}`; console.error(err); });
</script>
</body>
</html>
