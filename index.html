<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hand Quads</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:system-ui}
#video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;transform:scaleX(-1)}
#three-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
#loading{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.92);color:#fff;gap:16px}
.spinner{width:44px;height:44px;border:3px solid rgba(255,255,255,0.12);border-top-color:#64ffda;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:13px;color:rgba(255,255,255,0.6);text-align:center;line-height:1.8}
#btn{margin-top:12px;padding:10px 28px;border:none;border-radius:20px;background:#64ffda;color:#000;font-size:14px;font-weight:600;cursor:pointer;display:none}
#hud{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:50;background:rgba(0,0,0,0.45);backdrop-filter:blur(6px);color:rgba(255,255,255,0.85);padding:8px 20px;border-radius:20px;font-size:12px;pointer-events:none;opacity:0;transition:opacity 0.5s}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p id="status">Loading models…</p><button id="btn" onclick="startCamera()">Start Camera</button></div>
<div id="hud">Show both hands to the camera</div>
<video id="video" autoplay playsinline muted></video>
<canvas id="three-canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.1/selfie_segmentation.js"></script>

<script>
'use strict';

// ─── Config ─────────────────────────────────────────────────────────────
const QUAD_COUNT = 3;
const FINGER_TIPS = [4, 8, 12, 20]; // thumb, index, middle, pinky (skip ring)
const EFFECT_TYPES = ['redOutline', 'whiteSilhouette', 'greenOutline'];
const TEX_SIZE = 256;
const SMOOTHING = 0.42;

// ─── State ──────────────────────────────────────────────────────────────
let handData = [];
let faceLandmarks = [];
let smoothHands = [null, null];
let personMaskData = null;
let segmentationInstance = null;
let handsInstance = null;
let faceMeshInstance = null;

// ─── DOM ────────────────────────────────────────────────────────────────
const videoEl = document.getElementById('video');
const canvasEl = document.getElementById('three-canvas');
const loadingEl = document.getElementById('loading');
const statusEl = document.getElementById('status');
const btnEl = document.getElementById('btn');
const hudEl = document.getElementById('hud');

// ─── Three.js ───────────────────────────────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);

// ─── Shared Effect Canvas (video + mask compositing) ────────────────────
const effectCanvas = document.createElement('canvas');
effectCanvas.width = TEX_SIZE;
effectCanvas.height = TEX_SIZE;
const effectCtx = effectCanvas.getContext('2d', { willReadFrequently: true });
const effectTexture = new THREE.CanvasTexture(effectCanvas);
effectTexture.minFilter = THREE.LinearFilter;
effectTexture.magFilter = THREE.LinearFilter;

const maskCanvas = document.createElement('canvas');
maskCanvas.width = TEX_SIZE;
maskCanvas.height = TEX_SIZE;
const maskCtx = maskCanvas.getContext('2d', { willReadFrequently: true });

// ─── Texture compositing: video + person mask → effect per quad ─────────
function updateEffectTexture(effectType) {
  // Draw mirrored video
  effectCtx.save();
  effectCtx.translate(TEX_SIZE, 0);
  effectCtx.scale(-1, 1);
  effectCtx.drawImage(videoEl, 0, 0, TEX_SIZE, TEX_SIZE);
  effectCtx.restore();

  if (!personMaskData) {
    effectTexture.needsUpdate = true;
    return;
  }

  const imgData = effectCtx.getImageData(0, 0, TEX_SIZE, TEX_SIZE);
  const px = imgData.data;
  const EDGE_RADIUS = 6;
  const S = TEX_SIZE;

  for (let y = 0; y < S; y++) {
    const v = y / S;
    for (let x = 0; x < S; x++) {
      const u = x / S;
      const mi = (y * S + x) * 4;
      const m = personMaskData[mi] / 255;

      if (m < 0.2) {
        // Background: make transparent
        px[mi + 3] = 0;
        continue;
      }

      if (effectType === 'redOutline') {
        if (isMaskEdge(u, v, EDGE_RADIUS, S)) {
          px[mi] = 185; px[mi+1] = 23; px[mi+2] = 48; px[mi+3] = 230;
        } else {
          px[mi + 3] = 0; // person interior transparent (show base)
        }
      } else if (effectType === 'whiteSilhouette') {
        // White fill for person area
        px[mi] = 245; px[mi+1] = 243; px[mi+2] = 236;
        px[mi+3] = Math.floor(m * 220);
      } else if (effectType === 'greenOutline') {
        if (isMaskEdge(u, v, EDGE_RADIUS, S)) {
          px[mi] = 10; px[mi+1] = 162; px[mi+2] = 52; px[mi+3] = 230;
        } else {
          px[mi + 3] = 0;
        }
      }
    }
  }

  effectCtx.putImageData(imgData, 0, 0);
  effectTexture.needsUpdate = true;
}

function sampleMask(u, v) {
  if (!personMaskData) return 0;
  const px = Math.max(0, Math.min(TEX_SIZE - 1, Math.floor(u * TEX_SIZE)));
  const py = Math.max(0, Math.min(TEX_SIZE - 1, Math.floor(v * TEX_SIZE)));
  return personMaskData[(py * TEX_SIZE + px) * 4] / 255;
}

function isMaskEdge(u, v, radius, S) {
  if (sampleMask(u, v) < 0.3) return false;
  const du = radius / S;
  const dv = radius / S;
  return sampleMask(u-du,v) < 0.3 || sampleMask(u+du,v) < 0.3 ||
         sampleMask(u,v-dv) < 0.3 || sampleMask(u,v+dv) < 0.3;
}

// ─── Quad Geometry ──────────────────────────────────────────────────────
const quads = [];
const connectionLines = [];
const quadGroup = new THREE.Group();
scene.add(quadGroup);

for (let i = 0; i < QUAD_COUNT; i++) {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(12), 3));
  geo.setAttribute('uv', new THREE.BufferAttribute(new Float32Array([0,1, 1,1, 1,0, 0,0]), 2));
  geo.setIndex([0, 1, 2, 0, 2, 3]);

  const baseColor = i === 1 ? [0.04, 0.16, 0.28] : [0.96, 0.96, 0.91];

  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthTest: false,
    depthWrite: false,
    side: THREE.DoubleSide,
    uniforms: {
      uTexture: { value: effectTexture },
      uBaseColor: { value: new THREE.Color(baseColor[0], baseColor[1], baseColor[2]) },
      uGlow: { value: 0.0 },
      uTime: { value: 0.0 },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform sampler2D uTexture;
      uniform vec3 uBaseColor;
      uniform float uGlow;
      uniform float uTime;
      varying vec2 vUv;

      void main() {
        vec4 tex = texture2D(uTexture, vUv);

        // Where tex.a > 0: use effect (person area with video + overlay)
        // Where tex.a == 0: use base color (background or person interior)
        vec3 col = mix(uBaseColor, tex.rgb, tex.a);

        // Subtle edge glow
        float edgeDist = min(min(vUv.x, 1.0 - vUv.x), min(vUv.y, 1.0 - vUv.y));
        float edge = 1.0 - smoothstep(0.0, 0.03, edgeDist);
        col += vec3(0.5, 0.06, 0.1) * edge * 0.3;

        // Glow pulse
        float pulse = 0.5 + 0.5 * sin(uTime * 2.4 + vUv.x * 8.0);
        col += vec3(0.0, 0.55, 0.12) * uGlow * 0.1 * pulse;

        gl_FragColor = vec4(col, 0.96);
      }
    `,
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.renderOrder = 10;
  quadGroup.add(mesh);
  quads.push({ mesh, geo, mat });

  const lineGeo = new THREE.BufferGeometry();
  lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
  const lineMat = new THREE.LineBasicMaterial({
    color: new THREE.Color(i === 1 ? 0x0b3c5d : 0xb51a2d),
    transparent: true, opacity: 0.86,
  });
  const line = new THREE.LineSegments(lineGeo, lineMat);
  line.renderOrder = 5;
  quadGroup.add(line);
  connectionLines.push({ line, geo: lineGeo });
}

// ─── Smoothing ──────────────────────────────────────────────────────────
function smoothLandmarks(prev, curr, factor) {
  if (!prev) return curr.map(p => ({...p}));
  return curr.map((p, i) => ({
    x: prev[i].x + (p.x - prev[i].x) * factor,
    y: prev[i].y + (p.y - prev[i].y) * factor,
    z: prev[i].z + (p.z - prev[i].z) * factor,
  }));
}

// ─── MediaPipe callbacks ────────────────────────────────────────────────
function onHandResults(results) {
  const raw = (results.multiHandLandmarks || []).slice();
  if (raw.length === 0) { handData = []; smoothHands = [null, null]; return; }
  if (raw.length === 2) raw.sort((a, b) => lmToNDC(a[9]).x - lmToNDC(b[9]).x);
  handData = raw;
  const next = [null, null];
  for (let h = 0; h < handData.length; h++) {
    next[h] = smoothLandmarks(smoothHands[h], handData[h], SMOOTHING);
  }
  smoothHands = next;
}

function onFaceResults(results) {
  faceLandmarks = (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) || [];
}

function onSegmentationResults(results) {
  if (results.segmentationMask) {
    maskCtx.drawImage(results.segmentationMask, 0, 0, TEX_SIZE, TEX_SIZE);
    personMaskData = maskCtx.getImageData(0, 0, TEX_SIZE, TEX_SIZE).data;
  }
}

// ─── Load models ────────────────────────────────────────────────────────
async function loadModels() {
  const dummy = document.createElement('canvas');
  dummy.width = 64; dummy.height = 48;

  statusEl.textContent = 'Downloading hand model…';
  handsInstance = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${f}` });
  handsInstance.setOptions({ maxNumHands: 2, modelComplexity: 0, minDetectionConfidence: 0.6, minTrackingConfidence: 0.5 });
  handsInstance.onResults(onHandResults);
  await handsInstance.send({ image: dummy });

  statusEl.textContent = 'Downloading face model…';
  faceMeshInstance = new FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/${f}` });
  faceMeshInstance.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
  faceMeshInstance.onResults(onFaceResults);
  await faceMeshInstance.send({ image: dummy });

  statusEl.textContent = 'Downloading segmentation model…';
  segmentationInstance = new SelfieSegmentation({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation@0.1/${f}` });
  segmentationInstance.setOptions({ modelSelection: 1 });
  segmentationInstance.onResults(onSegmentationResults);
  await segmentationInstance.send({ image: dummy });

  statusEl.textContent = 'Ready!';
  btnEl.style.display = 'block';
}

// ─── Camera ─────────────────────────────────────────────────────────────
async function startCamera() {
  btnEl.style.display = 'none';
  statusEl.textContent = 'Requesting camera…';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    videoEl.srcObject = stream;
    await videoEl.play();

    const W = videoEl.videoWidth || 1280;
    const H = videoEl.videoHeight || 720;
    const aspect = window.innerWidth / window.innerHeight;
    const videoAspect = W / H;
    if (videoAspect > aspect) {
      camera.top = 1; camera.bottom = -1;
      camera.left = -videoAspect / aspect; camera.right = videoAspect / aspect;
    } else {
      camera.left = -1; camera.right = 1;
      camera.top = aspect / videoAspect; camera.bottom = -aspect / videoAspect;
    }
    camera.updateProjectionMatrix();

    // Tracking loop (separate from render)
    let trackFrame = 0;
    async function track() {
      if (videoEl.readyState >= 2) {
        if (handsInstance) await handsInstance.send({ image: videoEl });
        trackFrame++;
        if (faceMeshInstance && trackFrame % 3 === 0) await faceMeshInstance.send({ image: videoEl });
        if (segmentationInstance && trackFrame % 5 === 0) await segmentationInstance.send({ image: videoEl });
      }
      requestAnimationFrame(track);
    }
    track();

    // Render loop
    const start = performance.now();
    function render(now) {
      const time = (now - start) / 1000;
      updateQuads(time);
      // Update texture with current effect (rotate per frame for perf)
      if (personMaskData) {
        updateEffectTexture(EFFECT_TYPES[Math.floor(time * 0.5) % QUAD_COUNT]);
      }
      renderer.render(scene, camera);
      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);

    loadingEl.style.display = 'none';
    hudEl.style.opacity = '1';
    setTimeout(() => hudEl.style.opacity = '0', 4000);
  } catch (err) {
    statusEl.textContent = `Camera error: ${err.message}`;
    btnEl.style.display = 'block';
  }
}

// ─── Update quad positions ──────────────────────────────────────────────
function lmToNDC(lm) { return { x: -(lm.x * 2 - 1), y: -(lm.y * 2 - 1) }; }

const FINGER_MCP = { 4: 2, 8: 5, 12: 9, 16: 13, 20: 17 };
const FINGER_PIP = { 4: 3, 8: 6, 12: 10, 16: 14, 20: 18 };

function ribbonAnchor(landmarks, tipIdx, handSide) {
  const tip = landmarks[tipIdx];
  const mcp = landmarks[FINGER_MCP[tipIdx]];
  const pip = landmarks[FINGER_PIP[tipIdx]] || mcp;
  if (!mcp || !pip) return lmToNDC(tip);
  const towardPalm = tipIdx === 4 ? 0.2 : 0.14;
  const x = tip.x + (mcp.x - tip.x) * towardPalm;
  const y = tip.y + (mcp.y - tip.y) * towardPalm;
  const z = tip.z + (pip.z - tip.z) * 0.25;
  const ndc = lmToNDC({ x, y, z });
  const palm = lmToNDC(landmarks[9]);
  const spread = tipIdx === 4 || tipIdx === 20 ? 0.045 : 0.02;
  const dx = ndc.x - palm.x;
  const dy = ndc.y - palm.y;
  const len = Math.hypot(dx, dy) || 1;
  return { x: ndc.x + (dx / len) * spread + handSide * 0.006, y: ndc.y + (dy / len) * spread, z };
}

function updateQuads(time) {
  const hands = smoothHands;
  if (!hands[0] || !hands[1]) { quadGroup.visible = false; return; }
  quadGroup.visible = true;

  const L = hands[0], R = hands[1];
  const wristGap = Math.abs(lmToNDC(L[0]).x - lmToNDC(R[0]).x);
  const globalGlow = Math.max(0, 1 - wristGap * 1.2);

  const Ltips = FINGER_TIPS.map(idx => ribbonAnchor(L, idx, -1));
  const Rtips = FINGER_TIPS.map(idx => ribbonAnchor(R, idx, 1));

  for (let i = 0; i < QUAD_COUNT; i++) {
    const { mesh, geo, mat } = quads[i];
    const { line, geo: lineGeo } = connectionLines[i];

    const lt = Ltips[i], rt = Rtips[i], rb = Rtips[i+1], lb = Ltips[i+1];

    // Degenerate detection → triangle merge
    const MERGE_THRESHOLD = 0.045;
    const distLT_RT = Math.hypot(lt.x - rt.x, lt.y - rt.y);
    const distLB_RB = Math.hypot(lb.x - rb.x, lb.y - rb.y);
    const distLT_LB = Math.hypot(lt.x - lb.x, lt.y - lb.y);
    const distRT_RB = Math.hypot(rt.x - rb.x, rt.y - rb.y);
    const mergeTop = distLT_RT < MERGE_THRESHOLD;
    const mergeBot = distLB_RB < MERGE_THRESHOLD;
    const mergeLeft = distLT_LB < MERGE_THRESHOLD;
    const mergeRight = distRT_RB < MERGE_THRESHOLD;
    if ([mergeTop, mergeBot, mergeLeft, mergeRight].filter(Boolean).length >= 3) {
      mesh.visible = false; line.visible = false; continue;
    }
    mesh.visible = true; line.visible = true;

    let verts;
    if (mergeTop) { const t = {x:(lt.x+rt.x)/2,y:(lt.y+rt.y)/2}; verts = [t,rb,lb,t]; }
    else if (mergeBot) { const b = {x:(lb.x+rb.x)/2,y:(lb.y+rb.y)/2}; verts = [lt,rt,b,b]; }
    else if (mergeLeft) { const l = {x:(lt.x+lb.x)/2,y:(lt.y+lb.y)/2}; verts = [l,rt,rb,l]; }
    else if (mergeRight) { const r = {x:(rt.x+rb.x)/2,y:(rt.y+rb.y)/2}; verts = [lt,r,r,lb]; }
    else { verts = [lt, rt, rb, lb]; }

    const avgZ = (Ltips[i].z + Rtips[i].z + Ltips[i+1].z + Rtips[i+1].z) / 4 || 0;
    const depth = avgZ * 0.15;
    const pos = geo.attributes.position.array;
    for (let v = 0; v < 4; v++) { pos[v*3] = verts[v].x; pos[v*3+1] = verts[v].y; pos[v*3+2] = depth; }
    geo.attributes.position.needsUpdate = true;
    geo.computeVertexNormals();

    mat.uniforms.uTime.value = time;
    mat.uniforms.uGlow.value = globalGlow;

    const lp = lineGeo.attributes.position.array;
    lp[0] = verts[0].x; lp[1] = verts[0].y; lp[2] = depth + 0.001;
    lp[3] = verts[1].x; lp[4] = verts[1].y; lp[5] = depth + 0.001;
    lineGeo.attributes.position.needsUpdate = true;
  }
}

// ─── Resize ─────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Bootstrap ──────────────────────────────────────────────────────────
loadModels().catch(err => {
  statusEl.textContent = `Error: ${err.message}`;
  console.error(err);
});
</script>
</body>
</html>
